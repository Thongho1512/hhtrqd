<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Grad 1: Base Workforce (Classic Navy to Royal Blue) -->
    <linearGradient id="grad1" x1="0" y1="100" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    
    <!-- Grad 2: Developing Workforce (Royal Blue to Vibrant Cyan) -->
    <linearGradient id="grad2" x1="0" y1="100" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Grad 3: AI-Optimized Workforce (Deep Cyan to Bright Emerald) -->
    <linearGradient id="grad3" x1="0" y1="100" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <!-- Subtle Premium Drop Shadow for the AI Spark -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#10B981" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Group 1: Standard Analytics (Left) -->
  <g fill="url(#grad1)">
    <circle cx="20" cy="55" r="10" />
    <rect x="10" y="69" width="20" height="26" rx="10" />
  </g>

  <!-- Group 2: Growth Analytics (Center) -->
  <g fill="url(#grad2)">
    <circle cx="50" cy="35" r="10" />
    <rect x="40" y="49" width="20" height="46" rx="10" />
  </g>

  <!-- Group 3: AI Predicted Peak (Right) -->
  <g fill="url(#grad3)">
    <!-- AI Sparkle Head (4-Pointed Star using exact Bezier curves) -->
    <path d="M 80 3 Q 80 15 92 15 Q 80 15 80 27 Q 80 15 68 15 Q 80 15 80 3 Z" filter="url(#glow)" />
    <!-- Taller Body -->
    <rect x="70" y="31" width="20" height="64" rx="10" />
  </g>
</svg>
