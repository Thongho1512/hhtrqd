<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary Indigo-Cyan Gradient -->
    <linearGradient id="gradPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    
    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- The App Icon Base (Squircle) -->
  <rect x="15" y="15" width="70" height="70" rx="20" fill="url(#gradPrimary)" fill-opacity="0.08" stroke="url(#gradPrimary)" stroke-width="3"/>

  <!-- Analytics Trend Line -->
  <path d="M 30 65 L 45 45 L 55 55 L 70 35" stroke="url(#gradPrimary)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI Prediction Pulse (Nodes) -->
  <!-- Historic Nodes -->
  <circle cx="30" cy="65" r="4" fill="#4F46E5"/>
  <circle cx="45" cy="45" r="4" fill="#4F46E5"/>
  <circle cx="55" cy="55" r="4" fill="#6366F1"/>
  
  <!-- The Prediction Target Node (Glowing AI node) -->
  <circle cx="70" cy="35" r="6" fill="#06B6D4" filter="url(#glow)"/>
  
  <!-- Arrow indicating growth/forecast extending from target node -->
  <path d="M 64 29 L 76 29 L 76 41" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
